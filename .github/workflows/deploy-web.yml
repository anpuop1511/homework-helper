name: 🚀 Deploy Web App to Next.js

on:
  push:
    branches:
      - main # Triggers when you push or merge a PR to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 1. Checkout Flutter App
        uses: actions/checkout@v4

      - name: 2. Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 3. Install Dependencies
        run: flutter pub get

      - name: 4. Build Flutter Web (Securely Injecting Keys)
        run: |
          flutter config --enable-web
          flutter create . --platforms web
          flutter build web --release --base-href "/app/" \
            --dart-define="FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}" \
            --dart-define="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"

      - name: 5. Checkout Next.js Website Repo
        uses: actions/checkout@v4
        with:
          repository: 'anpuop1511/homework-helper-web'
          token: ${{ secrets.WEB_REPO_PAT }} # Uses your PAT to get push access
          path: 'web-repo'

      - name: 6. Copy Build & Push to Next.js Repo
        run: |
          # Clear the old flutter web build
          rm -rf web-repo/public/app/*

          # Copy the newly built flutter web app into the Next.js public/app folder
          cp -R build/web/* web-repo/public/app/

          # Push the changes to trigger a Vercel deployment
          cd web-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🚀 Auto-deploy securely compiled Flutter Web App" || echo "No changes to deploy"
          git push

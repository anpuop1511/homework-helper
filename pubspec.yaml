name: homework_helper
description: A comprehensive Homework Helper app built with Material 3 Expressive design.
publish_to: 'none'

version: 2.4.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  provider: ^6.1.5
  shared_preferences: ^2.3.2
  google_generative_ai: ^0.4.7
  dynamic_color: ^1.8.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.0
  animate_do: ^4.2.0
  nfc_manager: ^4.2.1
  nfc_manager_ndef: ^1.1.0
  image_picker: ^1.1.2
  firebase_storage: ^13.2.0
  qr_flutter: ^4.1.0
  share_plus: ^13.0.0
  flutter_dotenv: ^6.0.0
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#007FFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#007FFF"
    theme_color: "#007FFF"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - .env


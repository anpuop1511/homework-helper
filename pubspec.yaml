name: homework_helper
description: A comprehensive Homework Helper app built with Material 3 Expressive design.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_generative_ai: ^0.4.6
  dynamic_color: ^1.7.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  animate_do: ^3.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
